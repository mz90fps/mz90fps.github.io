<style>
.keyboard-products{margin-top:35px}
.keyboard-title{text-align:center;font-size:22px;font-weight:700;color:#222;margin-bottom:12px}
.keyboard-scroll{display:flex;gap:16px;overflow-x:auto;scroll-behavior:smooth;padding:8px 0 15px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.keyboard-scroll::-webkit-scrollbar{display:none}
.keyboard-card{flex:0 0 auto;width:165px;background:#cdbca6;border-radius:22px;padding:10px;box-sizing:border-box;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.keyboard-card img{width:100%;height:120px;object-fit:cover;border-radius:16px}
.keyboard-name{margin-top:10px;font-size:15px;font-weight:600;text-align:center;height:42px;color:#222;line-height:1.35}
.keyboard-btn{width:100%;margin-top:10px;padding:11px 0;border:none;border-radius:999px;background:#b69b7d;color:#fff;font-weight:600;cursor:pointer}
.keyboard-btn:hover{background:#9d8366}
@media(max-width:768px){
.keyboard-card{width:155px}
.keyboard-card img{height:110px}
}
</style>

<div class="keyboard-products">
  <div class="keyboard-title">Keyboards</div>

  <div class="keyboard-scroll">

    <div class="keyboard-card">
      <img src="Fingersgk1.jpg">
      <div class="keyboard-name">QuikFINGERS Lethal-GK1</div>
      <button class="keyboard-btn" onclick="showSection('section25')">View</button>
    </div>

    <div class="keyboard-card">
      <img src="Kreohive75v2.jpg">
      <div class="keyboard-name">Kreo Hive 75</div>
      <button class="keyboard-btn" onclick="showSection('section20')">View</button>
    </div>

    <div class="keyboard-card">
      <img src="Kreokeeb1.png">
      <div class="keyboard-name">Kreo Swarm 75%</div>
      <button class="keyboard-btn" onclick="showSection('section11')">View</button>
    </div>

    <div class="keyboard-card">
      <img src="Portonicski5.jpg">
      <div class="keyboard-name">Portronics Ki-Pad 5 Combo</div>
      <button class="keyboard-btn" onclick="showSection('section15')">View</button>
    </div>

  </div>
</div>

<script>
const keyboard=document.querySelector(".keyboard-scroll");
let kd=false,kStartX,kStartLeft;
keyboard.addEventListener("mousedown",e=>{
  kd=true;
  kStartX=e.pageX;
  kStartLeft=keyboard.scrollLeft;
});
document.addEventListener("mousemove",e=>{
  if(!kd) return;
  e.preventDefault();
  keyboard.scrollLeft=kStartLeft-(e.pageX-kStartX);
});
document.addEventListener("mouseup",()=>kd=false);
</script>
