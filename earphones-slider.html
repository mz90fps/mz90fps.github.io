  <style>
/* Nee ayacha CSS muzhuvan ivide paste cheyyuka */

  <style>
.earphones-products{
    margin-top:15px;
}

.setup-title{
    text-align:center;
    font-size:22px;
    font-weight:700;
    color:#222;
    margin-bottom:12px;
}

.earphones-scroll-wrapper{
    position:relative;
    max-width:900px;
    margin:0 auto;
}

.earphones-scroll{
    cursor:grab;
    user-select:none;
    -webkit-user-select:none;
    touch-action:pan-x;
    display:flex;
    gap:16px;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
    padding:8px 20px 15px;
    scrollbar-width:none;
}

.earphones-scroll.dragging,
.earphones-scroll.dragging *{
    user-select:none !important;
    -webkit-user-select:none !important;
}

.earphones-scroll img{
    -webkit-user-drag:none;
    user-select:none;
}

.earphones-scroll::-webkit-scrollbar{
    display:none;
}

.earphones-card{
    flex:0 0 auto;
    width:165px;
    background:#cdbca6;
    border-radius:22px;
    padding:10px;
    box-sizing:border-box;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.earphones-card img{
    width:100%;
    height:120px;
    object-fit:cover;
    display:block;
    border-radius:16px;
}

.product-name{
    margin-top:10px;
    font-size:15px;
    font-weight:600;
    color:#222;
    line-height:1.35;
    text-align:center;
    height:42px;
    overflow:hidden;
}

.view-btn{
    width:100%;
    border:none;
    cursor:pointer;
    margin-top:10px;
    background:#b69b7d;
    color:white;
    font-size:14px;
    font-weight:600;
    padding:11px 0;
    border-radius:999px;
    transition:.25s;
}

.view-btn:hover{
    background:#9d8366;
}

.scroll-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#b69b7d;
    color:#fff;
    font-size:20px;
    cursor:pointer;
    z-index:5;
}

.scroll-left{
    left:-15px;
}

.scroll-right{
    right:-15px;
}

@media(max-width:768px){

.scroll-btn{
    display:none;
}

.earphones-card{
    width:155px;
}

.earphones-card img{
    height:110px;
}

.product-name{
    font-size:14px;
}

}

.touch-indicator{
position:fixed;width:28px;height:28px;border-radius:50%;
background:rgba(120,120,120,.35);
backdrop-filter:blur(3px);
pointer-events:none;
transform:translate(-50%,-50%);
opacity:0;
z-index:999999;
transition:opacity .12s;
}
.earphones-scroll.dragging{cursor:none!important;}

</style>
  

<div class="earphones-products">

    <!-- Nee ayacha My Setup Products HTML muzhuvan ivide -->

<div class="setup-products">

    <div class="setup-title">
       iem earphones
    </div>

    <div class="earphones-scroll-wrapper">
<div class="earphones-scroll" id="earphonesScroll">



            <!-- cell bell gaming chair -->
            <div class="earphones-card">

                <img src="Cellbell.jpg">

                <div class="earphones-name">
                 gaming chair
                </div>

                <button class="view-btn"
                onclick="showSection('section23')">
                View
                </button>

            </div>


           
  
</div>

<script>
const slider=document.getElementById("earphonesScroll");
let down=false,startX,startScroll,drag=false;
slider.style.cursor="grab";
slider.querySelectorAll("img").forEach(i=>i.draggable=false);
slider.addEventListener("dragstart",e=>e.preventDefault());
slider.addEventListener("mousedown",e=>{
 down=true;drag=false;
 slider.classList.add("dragging");
 slider.style.cursor="grabbing";
 startX=e.pageX;
 startScroll=slider.scrollLeft;
});
document.addEventListener("mousemove",e=>{
 if(!down)return;
 e.preventDefault();
 const dx=e.pageX-startX;
 if(Math.abs(dx)>4)drag=true;
 slider.scrollLeft=startScroll-dx;
});
document.addEventListener("mouseup",()=>{
 down=false;
 requestAnimationFrame(()=>{
   slider.classList.remove("dragging");
   slider.style.cursor="grab";
 });
});
slider.querySelectorAll("button").forEach(b=>{
 b.addEventListener("click",e=>{
   if(drag){e.preventDefault();e.stopPropagation();}
 });
});
const indicator=document.createElement('div');
indicator.className='touch-indicator';
document.body.appendChild(indicator);
slider.addEventListener('mousedown',e=>{
 indicator.style.opacity='1';
 indicator.style.left=e.clientX+'px';
 indicator.style.top=e.clientY+'px';
});
document.addEventListener('mousemove',e=>{
 if(!down)return;
 indicator.style.left=e.clientX+'px';
 indicator.style.top=e.clientY+'px';
});
document.addEventListener('mouseup',()=>{
 indicator.style.opacity='0';
});
</script>
