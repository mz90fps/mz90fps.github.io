
<style>
.light-products{margin-top:35px}
.light-title{text-align:center;font-size:22px;font-weight:700;color:#222;margin-bottom:12px}
.light-scroll{display:flex;gap:16px;overflow-x:auto;scroll-behavior:smooth;padding:8px 0 15px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.light-scroll::-webkit-scrollbar{display:none}
.light-card{flex:0 0 auto;width:165px;background:#cdbca6;border-radius:22px;padding:10px;box-sizing:border-box;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.light-card img{width:100%;height:120px;object-fit:cover;border-radius:16px}
.light-name{margin-top:10px;font-size:15px;font-weight:600;text-align:center;height:42px;line-height:1.35;color:#222}
.light-btn{width:100%;margin-top:10px;padding:11px 0;border:none;border-radius:999px;background:#b69b7d;color:#fff;font-weight:600;cursor:pointer}
.light-btn:hover{background:#9d8366}
@media(max-width:768px){.light-card{width:155px}.light-card img{height:110px}}
</style>

<div class="light-products">
<div class="light-title">RGB & Lights</div>

<div class="light-scroll">

<div class="light-card">
<img src="radiyon.jpg">
<div class="light-name">Smart RGBIC LED Strip Light</div>
<button class="light-btn" onclick="showSection('section17')">View</button>
</div>

<div class="light-card">
<img src="Rgbneon1.png">
<div class="light-name">RGB Neon LED Strip Light</div>
<button class="light-btn" onclick="showSection('section6')">View</button>
</div>

<div class="light-card">
<img src="Walllight01.png">
<div class="light-name">Wall Light LED Lamp</div>
<button class="light-btn" onclick="showSection('section7')">View</button>
</div>

<div class="light-card">
<img src="Tablelamp1.png">
<div class="light-name">Table Light Bar</div>
<button class="light-btn" onclick="showSection('section8')">View</button>
</div>

</div>
</div>

<script>
const light=document.querySelector(".light-scroll");
let d=false,sx=0,sl=0;
light.addEventListener("mousedown",e=>{d=true;sx=e.pageX;sl=light.scrollLeft;});
document.addEventListener("mousemove",e=>{
 if(!d)return;
 e.preventDefault();
 light.scrollLeft=sl-(e.pageX-sx);
});
document.addEventListener("mouseup",()=>d=false);
</script>
