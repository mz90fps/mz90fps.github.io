
<style>
.mouse-products{margin-top:35px}
.mouse-title{text-align:center;font-size:22px;font-weight:700;color:#222;margin-bottom:12px}
.mouse-scroll{display:flex;gap:16px;overflow-x:auto;scroll-behavior:smooth;padding:8px 0 15px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.mouse-scroll::-webkit-scrollbar{display:none}
.mouse-card{flex:0 0 auto;width:165px;background:#cdbca6;border-radius:22px;padding:10px;box-sizing:border-box;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.mouse-card img{width:100%;height:120px;object-fit:cover;border-radius:16px}
.mouse-name{margin-top:10px;font-size:15px;font-weight:600;text-align:center;height:42px;color:#222;line-height:1.35}
.mouse-btn{width:100%;margin-top:10px;padding:11px 0;border:none;border-radius:999px;background:#b69b7d;color:#fff;font-weight:600;cursor:pointer}
.mouse-btn:hover{background:#9d8366}
@media(max-width:768px){.mouse-card{width:155px}.mouse-card img{height:110px}}
</style>

<div class="mouse-products">
<div class="mouse-title">Gaming Mice</div>

<div class="mouse-scroll">

<div class="mouse-card">
<img src="AJ200P.png">
<div class="mouse-name">AJAZZ AJ200P NL AI</div>
<button class="mouse-btn" onclick="showSection('section4')">View</button>
</div>

<div class="mouse-card">
<img src="Ghostmouse.png">
<div class="mouse-name">Cybeart GHOST Mouse</div>
<button class="mouse-btn" onclick="showSection('section5')">View</button>
</div>

<div class="mouse-card">
<img src="Portonicski5.jpg">
<div class="mouse-name">Portronics Gaming Mouse</div>
<button class="mouse-btn" onclick="showSection('section15')">View</button>
</div>

</div>
</div>

<script>
const mouse=document.querySelector(".mouse-scroll");
let md=false,sx=0,sl=0;
mouse.addEventListener("mousedown",e=>{md=true;sx=e.pageX;sl=mouse.scrollLeft;});
document.addEventListener("mousemove",e=>{
 if(!md)return;
 e.preventDefault();
 mouse.scrollLeft=sl-(e.pageX-sx);
});
document.addEventListener("mouseup",()=>md=false);
</script>
