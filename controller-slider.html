
<style>
.controller-products{margin-top:35px}
.controller-title{text-align:center;font-size:22px;font-weight:700;color:#222;margin-bottom:12px}
.controller-scroll{display:flex;gap:16px;overflow-x:auto;scroll-behavior:smooth;padding:8px 0 15px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.controller-scroll::-webkit-scrollbar{display:none}
.controller-card{flex:0 0 auto;width:165px;background:#cdbca6;border-radius:22px;padding:10px;box-sizing:border-box;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.controller-card img{width:100%;height:120px;object-fit:cover;border-radius:16px}
.controller-name{margin-top:10px;font-size:15px;font-weight:600;text-align:center;height:42px;color:#222;line-height:1.35}
.controller-btn{width:100%;margin-top:10px;padding:11px 0;border:none;border-radius:999px;background:#b69b7d;color:#fff;font-weight:600;cursor:pointer}
.controller-btn:hover{background:#9d8366}
@media(max-width:768px){.controller-card{width:155px}.controller-card img{height:110px}}
</style>

<div class="controller-products">
<div class="controller-title">Controllers</div>

<div class="controller-scroll">

<div class="controller-card">
<img src="Mirage.png">
<div class="controller-name">Kreo Mirage Wireless RGB</div>
<button class="controller-btn" onclick="showSection('section3')">View</button>
</div>

<div class="controller-card">
<img src="Surgelite.jpg">
<div class="controller-name">Kreo Surge LITE</div>
<button class="controller-btn" onclick="showSection('section18')">View</button>
</div>

</div>
</div>

<script>
const controller=document.querySelector(".controller-scroll");
let down=false,startX,startLeft;
controller.addEventListener("mousedown",e=>{
 down=true;
 startX=e.pageX;
 startLeft=controller.scrollLeft;
});
document.addEventListener("mousemove",e=>{
 if(!down)return;
 e.preventDefault();
 controller.scrollLeft=startLeft-(e.pageX-startX);
});
document.addEventListener("mouseup",()=>down=false);
</script>
